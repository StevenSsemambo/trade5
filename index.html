/* ═══ PERSISTENCE ═══ */
function loadState() {
  try {
    const raw = localStorage.getItem('tb4');
    if (!raw) return;
    const p = JSON.parse(raw);
    Object.assign(STATE.user, p.user || {});
    STATE.progress = p.progress || {};
    STATE.journal = p.journal || [];
    STATE.chatHistory = (p.chatHistory || []).slice(-80);
    STATE.simTrades = p.simTrades || [];
    STATE.simBalance = p.simBalance ?? 10000;
    STATE.simEquity = p.simEquity ?? 10000;
    STATE.achievements = p.achievements || [];
    STATE.dailyStreak = p.dailyStreak || 0;
    STATE.lastActive = p.lastActive;
    STATE.notifications = p.notifications || [];
    updateStreak();
    applyTheme(STATE.user.theme || 'dark');
    applyFontSize(STATE.user.fontSize || 'medium');
    applyBrightness(STATE.user.brightness || 100);
  } catch(e) { console.warn('Load state error', e); }
}

function saveState() {
  try {
    localStorage.setItem('tb4', JSON.stringify({
      user: STATE.user,
      progress: STATE.progress,
      journal: STATE.journal,
      chatHistory: STATE.chatHistory.slice(-80),
      simTrades: STATE.simTrades.slice(-300),
      simBalance: STATE.simBalance,
      simEquity: STATE.simEquity,
      achievements: STATE.achievements,
      dailyStreak: STATE.dailyStreak,
      lastActive: STATE.lastActive,
      notifications: STATE.notifications,
    }));
  } catch(e) { console.warn('Save state error', e); }
}

function updateStreak() {
  const today = new Date().toDateString();
  if (!STATE.lastActive) { STATE.dailyStreak = 1; STATE.lastActive = today; return; }
  if (STATE.lastActive === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  STATE.dailyStreak = STATE.lastActive === yesterday ? STATE.dailyStreak + 1 : 1;
  STATE.lastActive = today;
}

/* ═══ THEME MANAGEMENT ═══ */
function applyTheme(t) {
  STATE.user.theme = t;
  if (t === 'dark') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', t);
  const metaColors = { dark:'#0A0A0F', light:'#F7F4EE', slate:'#0D1117', matrix:'#020A04', ocean:'#040810', crimson:'#0F0508', forest:'#050F08' };
  const meta = document.getElementById('theme-color-meta');
  if (meta) meta.content = metaColors[t] || '#0A0A0F';
}

function applyFontSize(s) {
  STATE.user.fontSize = s;
  document.body.style.fontSize = {small:'13px', medium:'15px', large:'17px'}[s] || '15px';
}

function applyBrightness(v) {
  STATE.user.brightness = v;
  document.documentElement.style.setProperty('--brightness', v / 100);
}

/* ═══ NOTIFICATIONS ═══ */
function addNotification(text, icon = '📢') {
  STATE.notifications.unshift({ id: Date.now(), text, icon, time: new Date().toISOString(), read: false });
  if (STATE.notifications.length > 50) STATE.notifications = STATE.notifications.slice(0, 50);
  updateNotificationDots();
  saveState();
}

function updateNotificationDots() {
  const unread = STATE.notifications.filter(n => !n.read).length;
  const dot = document.getElementById('mentor-dot');

  const mdot = document.getElementById('more-mentor-dot');

function showToast(msg, duration = 2800) {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const item = document.createElement('div');
  item.className = 'toast-item';
  item.innerHTML = msg;
  container.appendChild(item);
  setTimeout(() => { item.style.opacity = '0'; }, duration - 300);
  setTimeout(() => item.remove(), duration);
}

/* ═══ XP & LEVELS ═══ */
function addXP(amt) {
  STATE.user.xp += amt;
  let leveled = false;
  while (STATE.user.xp >= STATE.user.xpNext) {
    STATE.user.xp -= STATE.user.xpNext;
    STATE.user.level++;
    STATE.user.xpNext = Math.floor(STATE.user.xpNext * 1.35 + 100);
    leveled = true;
  }
  if (leveled) showLevelUp(STATE.user.level);
  saveState();
  return leveled;
}

function showLevelUp(lvl) {

}

function closeLevelUp() {

/* ═══ NAVIGATION ═══ */
function navigate(screen) {

  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const navMap = { home:'ni-home', learn:'ni-learn', trade:'ni-trade', journal:'ni-journal' };
  const navId = navMap[screen];
  if (navId) {
    const nb = document.getElementById(navId);
    if (nb) nb.classList.add('active');
  } else {
    const more = document.getElementById('ni-more');
    if (more) more.classList.add('active');
  }

  renderScreen(screen);
  const sw = document.getElementById('screen-wrap');
  if (sw) sw.scrollTop = 0;
}

/* ═══ FOREX CLOCK ═══ */
function getSessionStatus() {
  const now = new Date();
  const utcMins = now.getUTCHours() * 60 + now.getUTCMinutes();
  return [
    {name:'Sydney', flag:'🇦🇺', open:22*60, close:7*60},
    {name:'Tokyo',  flag:'🇯🇵', open:0,     close:9*60},
    {name:'London', flag:'🇬🇧', open:8*60,  close:17*60},
    {name:'New York',flag:'🇺🇸',open:13*60, close:22*60}
  ].map(s => {
    const isOpen = s.open > s.close ? utcMins >= s.open || utcMins < s.close : utcMins >= s.open && utcMins < s.close;
    return {...s, isOpen};
  });
}

function initForexClock() {
  const clockEl = document.getElementById('forex-clock');
  if (!clockEl) return;
  
  const sessions = getSessionStatus();
  clockEl.innerHTML = sessions.map(s => `
    <div class="clk-session ${s.isOpen ? 'open' : ''}">
      <div class="clk-name">${s.flag} ${s.name}</div>
      <div class="clk-status">${s.isOpen ? '● OPEN' : 'Closed'}</div>
    </div>
  `).join('');
}

function exportUserData() {
  const data = JSON.stringify({
    exportDate: new Date().toISOString(),
    user: STATE.user,
    progress: STATE.progress,
    journal: STATE.journal,
    simTrades: STATE.simTrades,
    achievements: STATE.achievements
  }, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tradebaby-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 Data exported!');
}

/* ═══ SPLASH & BOOT ═══ */
const SPLASH_MSGS = ['Initializing...', 'Loading lessons...', 'Preparing charts...', 'Almost ready...'];

function bootApp() {
  loadState();

  // Animate splash
  const fill = document.getElementById('splash-fill');
  const msg = document.getElementById('splash-msg');
  let pct = 0, mi = 0;

  const interval = setInterval(() => {
    pct = Math.min(pct + Math.random() * 20 + 5, 100);
    if (fill) fill.style.width = pct + '%';
    if (msg && mi < SPLASH_MSGS.length) msg.textContent = SPLASH_MSGS[mi++];
    
    if (pct >= 100) {
      clearInterval(interval);
      launchApp();
    }
  }, 250);
}

function launchApp() {
  setTimeout(() => {
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');
    
    if (splash) {
      splash.style.transition = 'opacity .5s';
      splash.style.opacity = '0';
      setTimeout(() => { if (splash) splash.style.display = 'none'; }, 500);
    }
    if (app) app.style.display = 'flex';

    if (!STATE.user.onboarded) {
      showOnboarding();
    } else {
      navigate('home');
    }
  }, 300);
}

/* ═══ ONBOARDING ═══ */
let _obStep = 0;
const OB_STEPS = [
  { id: 'name', type: 'text', title: 'Welcome!', sub: "What's your name?", field: 'name' }
];

function showOnboarding() {
  _obStep = 0;
  document.getElementById('onboarding').style.display = 'block';
  renderObStep();
}

function renderObStep() {
  const step = OB_STEPS[_obStep];
  document.getElementById('ob-body').innerHTML = `
    <div style="text-align:center">
      <h2 style="margin-bottom:16px">${step.title}</h2>
      <p style="color:var(--txt2);margin-bottom:24px">${step.sub}</p>
      <input class="inp" id="ob-input" placeholder="Your name" value="${STATE.user.name || ''}" style="margin-bottom:16px">
      <button class="btn btn-gold" onclick="obNext()">Continue →</button>
    </div>
  `;
}

function obNext() {
  const val = document.getElementById('ob-input')?.value?.trim();
  if (!val) { showToast('Please enter your name'); return; }
  STATE.user.name = val;
  _obStep++;
  if (_obStep >= OB_STEPS.length) finishOnboarding();
  else renderObStep();
}

function finishOnboarding() {
  STATE.user.onboarded = true;
  STATE.user.joinDate = new Date().toISOString();
  STATE.dailyStreak = 1;
  STATE.lastActive = new Date().toDateString();
  addXP(100);
  saveState();
  document.getElementById('onboarding').style.display = 'none';
  navigate('home');
  showToast(`🎉 Welcome, ${STATE.user.name}!`, 3000);
}

/* ═══ INSTALL PROMPT ═══ */
let deferredInstall = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  setTimeout(() => {
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'flex';
  }, 5000);
});

document.getElementById('install-btn')?.addEventListener('click', async () => {
  if (!deferredInstall) return;
  deferredInstall.prompt();
  const { outcome } = await deferredInstall.userChoice;
  if (outcome === 'accepted') showToast('Installing...');
  deferredInstall = null;
  document.getElementById('install-banner').style.display = 'none';
});

/* ═══ SERVICE WORKER ═══ */
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => console.log('SW:', e));
}

/* ═══ AUTO-SAVE ═══ */
setInterval(saveState, 30000);

/* ═══ PREVENT DOUBLE-TAP ZOOM ═══ */
let lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 280) e.preventDefault();
  lastTap = now;
}, { passive: false });

/* ═══ INIT ═══ */
document.addEventListener('DOMContentLoaded', bootApp);
console.log('🚀 TradeBaby Pro v8 loaded');
</script>
