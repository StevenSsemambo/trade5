<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TradeBaby Pro">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" id="theme-color-meta" content="#0A0A0F">
<meta name="description" content="TradeBaby Pro — World's most intelligent forex trading academy. Fully offline PWA.">
<meta name="application-name" content="TradeBaby Pro">
<title>TradeBaby Pro — Complete Trading Academy</title>
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
/* === TradeBaby Pro v8 — Complete CSS === */
:root {
  --gold: #C9A84C;
  --gold-l: #E8C97A;
  --gold-d: #7A6330;
  --gold-bg: rgba(201,168,76,0.08);
  --gold-glow: rgba(201,168,76,0.22);

  --bg:    #0A0A0F;
  --bg2:   #111118;
  --bg3:   #18181F;
  --bg4:   #1E1E28;
  --bg5:   #242430;
  --glass: rgba(15,15,22,0.88);

  --bdr:  rgba(201,168,76,0.13);
  --bdr2: rgba(255,255,255,0.07);
  --bdr3: rgba(255,255,255,0.04);

  --txt:  #F0EEE8;
  --txt2: #9B9891;
  --txt3: #5A5855;
  --txt4: #3A3835;

  --green:  #22C55E;
  --green-bg: rgba(34,197,94,0.08);
  --green-bdr: rgba(34,197,94,0.22);
  --red:    #EF4444;
  --red-bg: rgba(239,68,68,0.08);
  --red-bdr: rgba(239,68,68,0.22);
  --blue:   #60A5FA;
  --purple: #A78BFA;
  --orange: #F97316;
  --cyan:   #06B6D4;
  --pink:   #F472B6;

  --r:    14px;
  --rs:   10px;
  --rss:  6px;

  --font:    'DM Sans', -apple-system, sans-serif;
  --mono:    'DM Mono', 'Courier New', monospace;
  --display: 'Syne', system-ui, sans-serif;

  --nav-h:    62px;
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --total-nav: calc(var(--nav-h) + var(--safe-b));

  --shadow:    0 8px 32px rgba(0,0,0,0.55);
  --shadow-sm: 0 2px 12px rgba(0,0,0,0.35);
}

[data-theme="light"] {
  --bg:#F7F4EE; --bg2:#EDE9DF; --bg3:#E5E0D4; --bg4:#DDD7C8; --bg5:#D5CEBC;
  --glass:rgba(247,244,238,0.92);
  --bdr:rgba(160,120,40,0.2); --bdr2:rgba(0,0,0,0.09); --bdr3:rgba(0,0,0,0.04);
  --txt:#1A1814; --txt2:#5C584E; --txt3:#9B9790; --txt4:#C5C2BA;
  --shadow:0 4px 20px rgba(0,0,0,0.1);
}

[data-theme="slate"] {
  --bg:#0D1117; --bg2:#161B22; --bg3:#21262D; --bg4:#2D333B; --bg5:#373E47;
  --bdr:rgba(88,166,255,0.15); --bdr2:rgba(255,255,255,0.07);
  --gold:#58A6FF; --gold-l:#79C0FF; --gold-d:#1F6FEB; --gold-bg:rgba(88,166,255,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; font-size: 16px; }
body {
  height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button, input, select, textarea { font-family: inherit; outline: none; border: none; color: inherit; background: none; }
button { cursor: pointer; }
a { color: var(--gold); text-decoration: none; }
img { max-width: 100%; display: block; }

#app {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  max-width: 540px;
  margin: 0 auto;
}

#screen-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  scroll-behavior: smooth;
  padding-bottom: calc(var(--total-nav) + 16px);
  position: relative;
}

#screen {
  min-height: 100%;
  width: 100%;
}

#bottom-nav {
  flex-shrink: 0;
  background: var(--glass);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--bdr2);
  padding-bottom: var(--safe-b);
  z-index: 100;
  position: relative;
}
.nav-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  height: var(--nav-h);
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
  color: var(--txt3);
  transition: color .2s, transform .1s;
  padding: 6px 0;
}
.nav-item.active { color: var(--gold); }
.nav-item.active::after {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 22px;
  height: 2.5px;
  background: var(--gold);
  border-radius: 0 0 3px 3px;
}
.nav-item:active { transform: scale(.88); }
.nav-icon svg { width: 20px; height: 20px; stroke-width: 1.8; }
.nav-label { font-size: 9px; font-family: var(--display); font-weight: 700; }
.nav-dot { position: absolute; top: 4px; right: 8px; width: 7px; height: 7px; border-radius: 50%; background: var(--red); border: 2px solid var(--bg); }

@keyframes fadeUp { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes slideUp { from { transform:translateY(60px); opacity:0 } to { transform:translateY(0); opacity:1 } }
@keyframes pulse { 0%,100% { opacity:.4 } 50% { opacity:1 } }
@keyframes bounceIn { 0% { transform:scale(.3);opacity:0 } 50% { transform:scale(1.08) } 75% { transform:scale(.95) } 100% { transform:scale(1);opacity:1 } }

.a-fadeup { animation: fadeUp .3s cubic-bezier(.16,1,.3,1) both; }
.a-fadeup2 { animation: fadeUp .3s .07s cubic-bezier(.16,1,.3,1) both; }
.live-dot { width:7px; height:7px; border-radius:50%; background:var(--green); display:inline-block; animation:pulse 1.5s ease infinite; }

#splash {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  overflow: hidden;
}
.splash-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 35%, rgba(201,168,76,.14) 0%, transparent 65%),
              linear-gradient(180deg, #06060A 0%, #0A0A0F 100%);
}
.splash-grid {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(201,168,76,.04) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(201,168,76,.04) 1px, transparent 1px);
  background-size: 44px 44px;
}
.splash-content {
  position: relative; z-index: 2; text-align: center;
  animation: fadeIn .6s .2s ease both;
  padding: 0 24px;
}
.splash-logo-wrap { margin-bottom: 12px; }
.splash-icon {
  width: 90px; height: 90px; margin: 0 auto;
  animation: bounceIn .8s .1s cubic-bezier(.34,1.56,.64,1) both;
  filter: drop-shadow(0 0 24px rgba(201,168,76,.5));
  border-radius: 20px;
}
.splash-title {
  font-family: var(--display); font-weight: 800; font-size: 38px; line-height: 1;
  background: linear-gradient(135deg, #E8C97A, #C9A84C, #7A6330);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.splash-tagline { font-size: 15px; color: var(--txt2); margin-bottom: 6px; }
.splash-dev { font-size: 11px; color: var(--txt3); font-family: var(--display); letter-spacing: 2.5px; margin-bottom: 32px; }
.splash-loader { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.splash-loader-bar { width: 160px; height: 3px; background: var(--bg4); border-radius: 3px; overflow: hidden; }
.splash-loader-fill { height: 100%; background: linear-gradient(90deg, var(--gold-d), var(--gold), var(--gold-l)); border-radius: 3px; width: 0; transition: width .4s ease; }
.splash-loader-text { font-size: 10px; color: var(--txt3); font-family: var(--display); letter-spacing: 1.5px; text-transform: uppercase; }

#onboarding {
  position: fixed; inset: 0; z-index: 900; background: var(--bg); display: none;
}
.onboard-container { display: flex; flex-direction: column; height: 100%; max-width: 540px; margin: 0 auto; }
.onboard-header { flex-shrink: 0; padding-top: env(safe-area-inset-top, 16px); }
.onboard-progress-track { height: 3px; background: var(--bg4); }
.onboard-progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-d), var(--gold)); transition: width .5s cubic-bezier(.34,1.56,.64,1); }
.onboard-body { flex: 1; overflow-y: auto; padding: 28px 20px 40px; -webkit-overflow-scrolling: touch; }

#levelup-screen {
  display: none; position: fixed; inset: 0; z-index: 800;
  background: rgba(0,0,0,.85); align-items: center; justify-content: center;
  backdrop-filter: blur(8px);
}
#levelup-screen.show { display: flex; }
.levelup-card {
  position: relative; z-index: 1; background: var(--bg2); border: 2px solid var(--gold);
  border-radius: 24px; padding: 36px 28px; text-align: center; max-width: 300px; width: 90%;
  animation: bounceIn .5s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 0 60px var(--gold-glow), var(--shadow);
}
.levelup-trophy { font-size: 72px; display: block; margin-bottom: 12px; }
.levelup-title { font-family: var(--display); font-weight: 800; font-size: 32px; color: var(--gold); }
.levelup-level { font-size: 16px; color: var(--txt2); margin: 6px 0 4px; }
.levelup-msg { font-size: 14px; color: var(--txt3); margin-bottom: 4px; }

#toast-container {
  position: fixed; top: 18px; left: 50%; transform: translateX(-50%); z-index: 9998;
  display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none;
  width: 90%; max-width: 360px;
}
.toast-item {
  background: var(--bg2); border: 1.5px solid var(--bdr); border-radius: 12px;
  padding: 10px 18px; font-size: 13px; font-weight: 600; color: var(--txt);
  box-shadow: var(--shadow); pointer-events: all; text-align: center;
  animation: bounceIn .3s cubic-bezier(.34,1.56,.64,1) both;
  backdrop-filter: blur(12px); max-width: 100%;
}

#modal-backdrop {
  position: fixed; inset: 0; z-index: 700;
  background: rgba(0,0,0,.72); backdrop-filter: blur(6px);
  display: flex; align-items: flex-end; justify-content: center;
}
#modal-box {
  background: var(--bg2); border-radius: 22px 22px 0 0; border-top: 1px solid var(--bdr2);
  width: 100%; max-width: 540px; max-height: 90vh; overflow-y: auto;
  padding: 6px 20px 40px; animation: slideUp .3s cubic-bezier(.34,1.56,.64,1);
}
.modal-handle { width: 40px; height: 4px; background: var(--bdr2); border-radius: 2px; margin: 12px auto 20px; }

.card { background: var(--bg3); border: 1px solid var(--bdr2); border-radius: var(--r); padding: 16px; position: relative; }
.card-gold { background: linear-gradient(135deg, rgba(201,168,76,.1), rgba(201,168,76,.03)); border: 1px solid var(--bdr); }
.card-tappable { cursor: pointer; transition: transform .15s, border-color .2s; }
.card-tappable:active { transform: scale(.975); }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 20px; border-radius: var(--r); font-size: 14px; font-weight: 700;
  font-family: var(--display); cursor: pointer; transition: all .2s; width: 100%;
}
.btn-gold { background: linear-gradient(135deg, var(--gold), var(--gold-d)); color: #0A0A0F; box-shadow: 0 4px 16px var(--gold-glow); }
.btn-gold:active { transform: scale(.96); }
.btn-outline { border: 1.5px solid var(--bdr2); color: var(--txt); }
.btn-outline:active { background: var(--bg4); transform: scale(.97); }
.btn-ghost { background: var(--bg4); border: 1px solid var(--bdr2); color: var(--txt2); }
.btn-sm { padding: 8px 14px; font-size: 12px; width: auto; border-radius: var(--rs); }
.btn-xs { padding: 5px 10px; font-size: 11px; width: auto; border-radius: var(--rss); }
.btn-icon { width: 38px; height: 38px; padding: 0; border-radius: var(--rs); border: 1px solid var(--bdr2); display: flex; align-items: center; justify-content: center; }
.btn-icon:active { transform: scale(.9); }

.pill {
  display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; border-radius: 100px; font-size: 11px;
  font-weight: 700; font-family: var(--display);
}
.pill-gold { background: rgba(201,168,76,.15); color: var(--gold); border: 1px solid rgba(201,168,76,.3); }
.pill-green { background: rgba(34,197,94,.12); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
.pill-red { background: rgba(239,68,68,.12); color: var(--red); border: 1px solid rgba(239,68,68,.25); }

.inp-wrap { margin-bottom: 12px; }
.inp-label { display: block; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--txt2); font-family: var(--display); margin-bottom: 5px; }
.inp {
  width: 100%; background: rgba(255,255,255,.04); border: 1.5px solid var(--bdr2); border-radius: var(--rs);
  padding: 11px 14px; color: var(--txt); font-size: 14px;
}
.inp:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-glow); }

.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.stat-grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.stat-grid4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.stat-box { background: var(--bg3); border: 1px solid var(--bdr2); border-radius: var(--r); padding: 12px 14px; }
.stat-val { font-family: var(--display); font-weight: 800; font-size: 22px; color: var(--gold); line-height: 1.1; }
.stat-lbl { font-size: 10px; color: var(--txt3); margin-top: 4px; font-family: var(--display); letter-spacing: .5px; }

.prog-bar { height: 5px; background: var(--bg4); border-radius: 5px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold-d), var(--gold), var(--gold-l)); transition: width .6s cubic-bezier(.34,1.56,.64,1); }
.prog-bar.lg { height: 8px; }

.xp-wrap { background: var(--bg3); border: 1px solid var(--bdr2); border-radius: var(--r); padding: 14px; }
.xp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
.xp-level { font-family: var(--display); font-weight: 800; font-size: 13px; color: var(--gold); }
.xp-pts { font-size: 11px; color: var(--txt2); font-family: var(--mono); }

.pg-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px 8px; }
.pg-title { font-family: var(--display); font-weight: 800; font-size: 22px; line-height: 1; }
.back-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: var(--rs); background: var(--bg3); border: 1px solid var(--bdr2); flex-shrink: 0; cursor: pointer; }
.back-btn:active { transform: scale(.9); }
.section-lbl { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--txt3); font-family: var(--display); margin-bottom: 10px; }

.forex-clock { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.clk-session { background: var(--bg3); border: 1.5px solid var(--bdr2); border-radius: var(--rs); padding: 10px 6px; text-align: center; }
.clk-session.open { border-color: var(--green-bdr); background: var(--green-bg); }
.clk-name { font-size: 10px; font-weight: 700; font-family: var(--display); color: var(--txt2); }
.clk-status { font-size: 9px; font-weight: 700; font-family: var(--display); margin-top: 4px; }

.j-entry { background: var(--bg3); border: 1.5px solid var(--bdr2); border-radius: var(--r); padding: 14px; margin-bottom: 8px; cursor: pointer; transition: all .15s; }
.j-entry.win::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--green); }
.j-entry.loss::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--red); }

.notif-item { background: var(--bg3); border: 1px solid var(--bdr2); border-radius: var(--r); padding: 12px 14px; margin-bottom: 8px; display: flex; gap: 12px; align-items: flex-start; cursor: pointer; }
.notif-item.unread { border-color: var(--bdr); background: var(--gold-bg); }
.notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 3px; }

.screen-pad { padding: 16px; }

@media (min-width: 1024px) {
  #app { position: static; height: 100vh; max-width: 100%; flex-direction: row; }
  #bottom-nav { width: 220px; height: 100vh; padding-bottom: 0; border-top: none; border-right: 1px solid var(--bdr2); overflow-y: auto; }
  .nav-grid { display: flex; flex-direction: column; height: auto; padding: 20px 10px; }
  .nav-item { flex-direction: row; justify-content: flex-start; padding: 10px 12px; border-radius: var(--rs); gap: 10px; width: 100%; }
  .nav-item.active::after { display: none; }
  .nav-item.active { background: var(--gold-bg); color: var(--gold); }
  #screen-wrap { order: 2; flex: 1; height: 100vh; padding-bottom: 24px; }
  #screen { max-width: 720px; margin: 0 auto; }
}
</style>
</head>
<body>

<!-- INSTALL BANNER -->
<div id="install-banner" style="display:none;position:fixed;bottom:80px;left:12px;right:12px;z-index:500;background:linear-gradient(135deg,#1E1E28,#18181F);border:1.5px solid rgba(201,168,76,0.3);border-radius:14px;padding:14px 16px;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.5)">
  <div style="font-size:28px">📈</div>
  <div style="flex:1">
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:#F0EEE8">Install TradeBaby Pro</div>
    <div style="font-size:11px;color:#9B9891;margin-top:2px">Add to home screen for offline access</div>
  </div>
  <button id="install-btn" style="background:linear-gradient(135deg,#C9A84C,#7A6330);color:#0A0A0F;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-family:'Syne',sans-serif;font-size:12px;cursor:pointer">Install</button>
  <button onclick="document.getElementById('install-banner').style.display='none'" style="background:none;border:none;color:#5A5855;font-size:18px;cursor:pointer;padding:0 4px">×</button>
</div>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-bg"></div>
  <div class="splash-grid"></div>
  <canvas id="splash-canvas" style="position:absolute;inset:0;pointer-events:none"></canvas>
  <div class="splash-content">
    <div class="splash-logo-wrap">
      <img src="icons/icon.svg" class="splash-icon" alt="TradeBaby">
    </div>
    <h1 class="splash-title">TradeBaby Pro</h1>
    <p class="splash-tagline">Complete Trading Academy</p>
    <p class="splash-dev">by SayMy Tech Developers</p>
    <div class="splash-loader">
      <div class="splash-loader-bar"><div class="splash-loader-fill" id="splash-fill"></div></div>
      <div class="splash-loader-text" id="splash-msg">Initializing...</div>
    </div>
  </div>
</div>

<!-- ONBOARDING -->
<div id="onboarding" style="display:none">
  <div class="onboard-container">
    <div class="onboard-header">
      <div class="onboard-progress-track">
        <div class="onboard-progress-fill" id="ob-progress"></div>
      </div>
    </div>
    <div class="onboard-body" id="ob-body"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <main id="screen-wrap">
    <div id="screen"></div>
  </main>

  <!-- Bottom navigation -->
  <nav id="bottom-nav">
    <div class="nav-grid">
      <button class="nav-item active" id="ni-home" onclick="navigate('home')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
        <span class="nav-label">Home</span>
      </button>
      <button class="nav-item" id="ni-learn" onclick="navigate('learn')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg></span>
        <span class="nav-label">Learn</span>
      </button>
      <button class="nav-item" id="ni-trade" onclick="navigate('trade')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></span>

/* ═══ STATE MANAGEMENT ═══ */
const STATE = {

    name: '', level: 1, xp: 0, xpNext: 500,
    goal: '', experience: '', schedule: '', riskStyle: '', learningStyle: '',

  progress: {},

  simTrades: [], simBalance: 10000, simEquity: 10000,
  achievements: [],
  dailyStreak: 0, lastActive: null,
  dailyMood: null, dailyCheckIn: null,
  flashProgress: {},
  patternScore: { correct: 0, total: 0 },
  quizResults: {},
  notifications: [],
  behaviorLog: [],
};

/* ═══ PERSISTENCE ═══ */
function loadState() {
  try {
    const raw = localStorage.getItem('tb4');
    if (!raw) return;
    const p = JSON.parse(raw);
    if (p.user) Object.assign(STATE.user, p.user);
    if (p.progress) STATE.progress = p.progress;
    if (p.journal) STATE.journal = p.journal;
    if (p.chatHistory) STATE.chatHistory = p.chatHistory.slice(-80);
    if (p.simTrades) STATE.simTrades = p.simTrades;
    if (p.simBalance !== undefined) STATE.simBalance = p.simBalance;
    if (p.simEquity  !== undefined) STATE.simEquity  = p.simEquity;
    if (p.achievements) STATE.achievements = p.achievements;
    if (p.dailyStreak !== undefined) STATE.dailyStreak = p.dailyStreak;
    if (p.lastActive) STATE.lastActive = p.lastActive;
    if (p.dailyMood) STATE.dailyMood = p.dailyMood;
    if (p.dailyCheckIn) STATE.dailyCheckIn = p.dailyCheckIn;
    if (p.flashProgress) STATE.flashProgress = p.flashProgress;
    if (p.patternScore) STATE.patternScore = p.patternScore;
    if (p.quizResults) STATE.quizResults = p.quizResults;
    if (p.notifications) STATE.notifications = p.notifications;
    if (p.behaviorLog) STATE.behaviorLog = p.behaviorLog.slice(-500);
    updateStreak();
    applyTheme(STATE.user.theme || 'dark');
    applyFontSize(STATE.user.fontSize || 'medium');
    applyBrightness(STATE.user.brightness || 100);
  } catch(e) { console.warn('Load state error', e); }
}

function saveState() {
  try {
    localStorage.setItem('tb4', JSON.stringify({
      user: STATE.user,
      progress: STATE.progress,
      journal: STATE.journal,
      chatHistory: STATE.chatHistory.slice(-80),
      simTrades: STATE.simTrades.slice(-300),
      simBalance: STATE.simBalance,
      simEquity: STATE.simEquity,
      achievements: STATE.achievements,
      dailyStreak: STATE.dailyStreak,
      lastActive: STATE.lastActive,
      dailyMood: STATE.dailyMood,
      dailyCheckIn: STATE.dailyCheckIn,
      flashProgress: STATE.flashProgress,
      patternScore: STATE.patternScore,
      quizResults: STATE.quizResults,
      notifications: STATE.notifications,
      behaviorLog: STATE.behaviorLog.slice(-500),
    }));
  } catch(e) { console.warn('Save state error', e); }
}

function updateStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (!STATE.lastActive) { STATE.dailyStreak = 1; STATE.lastActive = today; return; }
  if (STATE.lastActive === today) return;
  STATE.dailyStreak = STATE.lastActive === yesterday ? STATE.dailyStreak + 1 : 1;
  STATE.lastActive = today;
}

/* ═══ THEME MANAGEMENT ═══ */
function applyTheme(t) {
  STATE.user.theme = t;
  if (t === 'dark') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', t);
  const metaColors = {
    dark:'#0A0A0F', light:'#F7F4EE', slate:'#0D1117',
    matrix:'#020A04', ocean:'#040810', crimson:'#0F0508', forest:'#050F08'
  };
  const meta = document.getElementById('theme-color-meta');
  if (meta) meta.content = metaColors[t] || '#0A0A0F';
}

function applyFontSize(s) {
  STATE.user.fontSize = s;
  document.body.style.fontSize = {small:'13px', medium:'15px', large:'17px'}[s] || '15px';
}

function applyBrightness(v) {
  STATE.user.brightness = v;
  document.documentElement.style.setProperty('--brightness', v / 100);
}

/* ═══ NOTIFICATIONS ═══ */
function addNotification(text, icon = '📢') {
  STATE.notifications.unshift({
    id: Date.now(), text, icon,
    time: new Date().toISOString(), read: false
  });
  if (STATE.notifications.length > 50) STATE.notifications = STATE.notifications.slice(0, 50);
  updateNotificationDots();
  saveState();
}

function updateNotificationDots() {
  const unread = STATE.notifications.filter(n => !n.read).length;
  const dot = document.getElementById('mentor-dot');
  if (dot) dot.style.display = unread > 0 ? 'block' : 'none';
  const mdot = document.getElementById('more-mentor-dot');
  if (mdot) mdot.style.display = unread > 0 ? 'block' : 'none';
}

/* ═══ TOAST ═══ */
function showToast(msg, duration = 2800) {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const item = document.createElement('div');
  item.className = 'toast-item';
  item.innerHTML = msg;
  container.appendChild(item);
  setTimeout(() => { item.style.opacity = '0'; }, duration - 300);
  setTimeout(() => item.remove(), duration);
}

/* ═══ MODAL ═══ */
function showModal(html) {
  const backdrop = document.getElementById('modal-backdrop');
  const box = document.getElementById('modal-box');
  if (!backdrop || !box) return;
  box.innerHTML = html;
  backdrop.style.display = 'flex';
}

function closeModal() {
  const backdrop = document.getElementById('modal-backdrop');
  if (backdrop) backdrop.style.display = 'none';
}

/* ═══ MORE MENU ═══ */
function showMoreMenu() {
  const b = document.getElementById('more-menu-backdrop');
  if (b) b.style.display = 'block';
  updateNotificationDots();
}

function closeMoreMenu() {
  const b = document.getElementById('more-menu-backdrop');
  if (b) b.style.display = 'none';
}

/* ═══ XP & LEVELS ═══ */
function addXP(amt) {
  STATE.user.xp += amt;
  let leveled = false;
  while (STATE.user.xp >= STATE.user.xpNext) {
    STATE.user.xp -= STATE.user.xpNext;
    STATE.user.level++;
    STATE.user.xpNext = Math.floor(STATE.user.xpNext * 1.35 + 100);
    leveled = true;
  }
  if (leveled) showLevelUp(STATE.user.level);
  saveState();
  checkAchievements();
  return leveled;
}

function showLevelUp(lvl) {
  const overlay = document.getElementById('levelup-screen');
  if (!overlay) return;
  document.getElementById('lu-title').textContent = `LEVEL ${lvl}!`;
  document.getElementById('lu-level').textContent = `You now a Level ${lvl} Trader`;
  const msgs = ['Keep grinding! 🔥', 'Strategy Library unlocked! 📊', 'You're getting serious! 💪'];
  document.getElementById('lu-msg').textContent = msgs[Math.min(lvl - 2, msgs.length - 1)] || 'Trading legend!';
  overlay.classList.add('show');
}

function closeLevelUp() {
  const o = document.getElementById('levelup-screen');
  if (o) o.classList.remove('show');
}

/* ═══ ACHIEVEMENTS ═══ */
function checkAchievements() {
  const defs = [
    { id: 'first-lesson',   check: () => completedCount() >= 1 },
    { id: 'five-lessons',   check: () => completedCount() >= 5 },
    { id: 'first-trade',    check: () => STATE.simTrades.length >= 1 },
    { id: 'first-journal',  check: () => STATE.journal.length >= 1 },
    { id: 'streak-3',       check: () => STATE.dailyStreak >= 3 },
    { id: 'level-5',        check: () => STATE.user.level >= 5 },
  ];
  const labels = {
    'first-lesson':'📚 First Step!', 'five-lessons':'🎯 Getting Serious',
    'first-trade':'📈 First Trade', 'first-journal':'📓 First Entry',
    'streak-3':'🔥 3-Day Streak', 'level-5':'⭐ Rising Star',
  };
  defs.forEach(d => {
    if (!STATE.achievements.includes(d.id) && d.check()) {
      STATE.achievements.push(d.id);
      showToast(`🏅 Achievement: ${labels[d.id] || d.id}`, 3500);
      addNotification(`Achievement unlocked: ${labels[d.id]}`, '🏅');
    }
  });
}

function completedCount() { return Object.keys(STATE.progress).length; }
function totalLessons() { return 0; } // Will be updated with actual lessons
function progressPct() { return 0; }

/* ═══ NAVIGATION ═══ */
function navigate(screen) {
  closeMoreMenu();
  STATE.screen = screen;
  
  // Log behavior
  BEHAVIOR.log('screen_visit', { screen });

  // Update nav highlight
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const navMap = { home:'ni-home', learn:'ni-learn', trade:'ni-trade', journal:'ni-journal' };
  const navId = navMap[screen];
  if (navId) {
    const nb = document.getElementById(navId);
    if (nb) nb.classList.add('active');
  } else {
    const more = document.getElementById('ni-more');
    if (more) more.classList.add('active');
  }

  renderScreen(screen);
  const sw = document.getElementById('screen-wrap');
  if (sw) sw.scrollTop = 0;
}

/* ═══ SCREEN RENDERING ═══ */
function renderScreen(screen) {
  const el = document.getElementById('screen');
  if (!el) return;

  const renderers = {
    home: renderHome,
    learn: renderLearn,
    trade: renderTrade,
    journal: renderJournal,
    mentor: renderMentor,
    profile: renderProfile,
    settings: renderSettings,
    notifications: renderNotifications,
    strategies: renderStrategies,
    calculator: renderCalculator,
    analytics: renderAnalytics,
    flashcards: renderFlashcards,
  };

  const fn = renderers[screen] || renderHome;
  el.innerHTML = fn();

  // Post-render hooks
  if (screen === 'home') initForexClock();
  if (screen === 'mentor') setTimeout(scrollChatToBottom, 50);
}

function getSmartInsight() {
  const now = new Date();
  const hr = now.getHours();
  const sessions = getSessionStatus();
  const soonSession = sessions.find(s => s.soon);
  const openSessions = sessions.filter(s => s.isOpen);
  const daysSinceJournal = STATE.journal.length > 0
    ? Math.round((now - new Date(STATE.journal[STATE.journal.length - 1].date)) / 86400000)
    : 999;

  if (daysSinceJournal >= 3 && STATE.simTrades.length > 0)
    return {icon:'📓', text:`You haven't journaled in ${daysSinceJournal} days. Log your trades to improve.`, action:'journal', cta:'Log Trade'};
  if (soonSession)
    return {icon:'⏰', text:`${soonSession.name} session opens in ~${soonSession.minsTill} minutes. Prepare your analysis.`, action:'trade', cta:'Open Charts'};
  if (openSessions.length > 0)
    return {icon:'📈', text:`${openSessions.map(s=>s.name).join(' + ')} active. Best trading window now.`, action:'trade', cta:'Practice Now'};
  if (completedCount() < 5)
    return {icon:'📚', text:`Complete more lessons to unlock advanced strategies.`, action:'learn', cta:'Study Now'};
  return {icon:'💡', text:`Consistent daily practice builds real skill.`, action:'learn', cta:'Start Learning'};
}

function scrollChatToBottom() {
  const end = document.getElementById('chat-end');
  if (end) end.scrollIntoView({ behavior: 'smooth' });
}

function appendChatMessage(role, text) {
  const container = document.getElementById('chat-messages');
  const end = document.getElementById('chat-end');
  if (!container) return;
  const div = document.createElement('div');
  div.className = `chat-msg ${role}`;
  div.innerHTML = text;
  if (end) container.insertBefore(div, end);
  else container.appendChild(div);
  scrollChatToBottom();
}

function submitChat() {
  const inp = document.getElementById('chat-inp');
  if (!inp) return;
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  STATE.chatHistory.push({ role: 'user', text });
  appendChatMessage('user', text);

  const response = generateResponse(text);
  STATE.chatHistory.push({ role: 'bot', text: response });
  appendChatMessage('bot', response);
  saveState();
}

function clearChat() {
  if (confirm('Clear chat history?')) {
    STATE.chatHistory = [];
    saveState();
    navigate('mentor');
  }
}

function generateResponse(input) {
  const q = input.toLowerCase().trim();
  
  const KB = {
    'what is forex': `The Forex market is the world's largest financial market with over $7.5 trillion traded daily. It operates 24/5 across global financial centres.`,
    'pip|pips': `A pip is the smallest standard price movement. Most pairs: 0.0001, JPY pairs: 0.01.`,
    'leverage': `Leverage lets you control a larger position with smaller capital. At 100:1, $1,000 controls $100,000. Amplifies both profits AND losses.`,
    'stop loss|sl': `A stop loss automatically closes a trade at a predetermined loss. ALWAYS use one.`,
    'take profit|tp': `Take profit closes your trade when it reaches your profit target. Set it BEFORE entering.`,
    'risk management': `The 1% Rule: never risk more than 1-2% of your account on any single trade.`,
    'support|resistance': `Support = price level where buying overcomes selling. Resistance = where selling overcomes buying.`,
    'candlestick|candle': `Candlesticks show Open, High, Low, Close prices. Green = bullish, Red = bearish.`,
    'rsi': `RSI measures momentum from 0-100. Above 70 = overbought, below 30 = oversold.`,
    'macd': `MACD shows trend direction and momentum. MACD crossing above signal = bullish, below = bearish.`,
    'moving average|ema|sma': `Moving averages smooth price action to show trend. EMA reacts faster, SMA is smoother.`,
    'fibonacci|fib': `Fibonacci retracements use the golden ratio. Key levels: 38.2%, 50%, 61.8%.`,
    'session|london|new york|tokyo': `Best trading: London/NY overlap (13:00-17:00 UTC) for highest liquidity.`,
    'psychology|discipline|emotions': `Trading psychology is 90% of success. After 2 consecutive losses, stop for the day.`,
    'journal|journaling': `A trading journal is your most powerful improvement tool. Log every trade with emotions.`,
  };

  for (const [patterns, answer] of Object.entries(KB)) {
    if (patterns.split('|').some(p => q.includes(p))) {
      return answer;
    }
  }

  return `Great question! I can help you with any trading concept. Try asking about pips, leverage, support/resistance, candlesticks, or risk management.`;
}

  if (q.includes('leverage')) return 'Leverage amplifies both profits and losses. At 100:1, $1,000 controls $100,000.';
  if (q.includes('stop loss')) return 'Always use a stop loss. Place it at a logical level, not a random pip distance.';

}

/* ═══ FOREX CLOCK ═══ */
function getSessionStatus() {
  const now = new Date();
  const utcMins = now.getUTCHours() * 60 + now.getUTCMinutes();
  const sessions = [
    {name:'Sydney', flag:'🇦🇺', open:22*60, close:7*60},
    {name:'Tokyo',  flag:'🇯🇵', open:0,     close:9*60},
    {name:'London', flag:'🇬🇧', open:8*60,  close:17*60},
    {name:'New York',flag:'🇺🇸',open:13*60, close:22*60},
  ];
  return sessions.map(s => {
    const isOpen = s.open > s.close
      ? utcMins >= s.open || utcMins < s.close
      : utcMins >= s.open && utcMins < s.close;
    const minsToOpen = s.open > utcMins ? s.open - utcMins : s.open + 1440 - utcMins;
    return {...s, isOpen, soon: !isOpen && minsToOpen <= 60, minsTill: minsToOpen};
  });
}

function initForexClock() {
  const clockEl = document.getElementById('forex-clock');
  const utcEl = document.getElementById('utc-time');
  if (!clockEl) return;

  const sessions = getSessionStatus();
  if (utcEl) utcEl.textContent = new Date().toUTCString().split(' ')[4] + ' UTC';

  clockEl.innerHTML = sessions.map(s => `
    <div class="clk-session ${s.isOpen ? 'open' : ''}">
      <div class="clk-name">${s.flag} ${s.name}</div>
      <div class="clk-status">${s.isOpen ? '● OPEN' : 'Closed'}</div>
    </div>
  `).join('');
}

/* ═══ SPLASH & BOOT ═══ */
const SPLASH_MSGS = ['Initializing...', 'Loading lessons...', 'Preparing charts...', 'Setting up mentor...', 'Almost ready...'];

function bootApp() {
  loadState();

  const fill = document.getElementById('splash-fill');
  const msg = document.getElementById('splash-msg');
  let pct = 0, mi = 0;

  const interval = setInterval(() => {
    pct = Math.min(pct + Math.random() * 22 + 8, 100);
    if (fill) fill.style.width = pct + '%';
    if (msg && mi < SPLASH_MSGS.length) msg.textContent = SPLASH_MSGS[mi++];
    if (pct >= 100) {
      clearInterval(interval);
      launchApp();
    }
  }, 350);

  // Draw splash canvas
  const canvas = document.getElementById('splash-canvas');
  if (canvas) {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    drawSplashStars(canvas);
  }
}

function drawSplashStars(canvas) {
  const ctx = canvas.getContext('2d');
  const stars = Array.from({length: 60}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.8 + 0.3,
    a: Math.random() * Math.PI * 2,
    speed: Math.random() * .008 + .003,
    base: Math.random() * .5 + .15,
  }));

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.a += s.speed;
      const opacity = s.base + Math.sin(s.a) * 0.2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(201,168,76,${opacity.toFixed(2)})`;
      ctx.fill();
    });
    if (document.getElementById('splash')?.style.display !== 'none') {
      requestAnimationFrame(draw);
    }
  }
  draw();
}

function launchApp() {
  setTimeout(() => {
    const splash = document.getElementById('splash');
    const app = document.getElementById('app');
    if (splash) {
      splash.style.transition = 'opacity .5s';
      splash.style.opacity = '0';
      setTimeout(() => { if (splash) splash.style.display = 'none'; }, 500);
    }
    if (app) app.style.display = 'flex';

    if (!STATE.user.onboarded) {
      showOnboarding();
    } else {
      navigate('home');
    }
  }, 300);
}
